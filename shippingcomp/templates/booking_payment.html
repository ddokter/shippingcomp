{% extends 'base.html' %}

{% load i18n django_bootstrap5 djbosui_tags %}

{% block title %}
<h1>{% trans 'Booking payment' %}
{% endblock %}

{% block content %}

{% block form %}
<form method="POST"
      enctype="multipart/form-data"
      class="form">

    {% csrf_token %}
    {{ form.media }}
    {% bootstrap_form form %}

    <div class="btn-group" role="group" aria-label="Form controls">
      <button type="submit" class="btn btn-primary">
	{% trans 'Save' %}
      </button>
      <a href="{{ view.cancel_url }}" role="button" class="btn btn-secondaryf">
	{% trans 'Cancel' %}
      </a>
    </div>
</form>
{% endblock form %}

{% endblock content %}
